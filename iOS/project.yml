name: Restclock
options:
  bundleIdPrefix: com.shimondeitel.restclock
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Restclock:
    type: application
    platform: iOS
    sources:
      - path: Restclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.restclock
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Restclock/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RestclockTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RestclockTests
      - path: Restclock.storekit
    dependencies:
      - target: Restclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.restclock.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RestclockUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RestclockUITests
    dependencies:
      - target: Restclock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.restclock.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Restclock:
    build:
      targets:
        Restclock: all
        RestclockTests: [test]
        RestclockUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Restclock.storekit
    test:
      config: Debug
      storeKitConfiguration: Restclock.storekit
      targets:
        - RestclockTests
        - RestclockUITests
    archive:
      config: Release
